<!DOCTYPE html>
<html>
    <head>
        <title>Minion Calculator</title>
        <link rel="stylesheet" href="../../dark_mode.css">
        <link rel="stylesheet" href="calculator.css">
        <script src="Hero_data_Manager.js"></script>
        <script src="GUI_creator.js"></script>
        <script src="calculator_add_ons.js"></script>
        <script src="calculator.js"></script>
        
    </head>
    <nav>
        <a href="https://herodirk.github.io">Home</a>
        <a href="https://herodirk.github.io/minion/index.html">Minions</a>
    </nav>
    <body>
        <h1>Minion Calculator: JS edition</h1>
        <div class="calculator">
            <div id="inputs_minion" class="frame">
                <div id="inputs_minion_grid" class="input_grid_frame"></div>
            </div><div id="inputs_player" class="frame">
                <div id="inputs_player_grid" class="input_grid_frame"></div>
            </div><div id="outputs_setup" class="frame">
                <div id="outputs_setup_grid" class="output_grid_frame"></div>
            </div><div id="outputs_profit" class="frame">
                <div id="outputs_profit_grid" class="output_grid_frame"></div>
            </div>
            <div id="controls" class="controls_frame"></div>
            <dialog id="edit_vars_dialog" class="floating_dialog">
                <div id="edit_vars" class="small_frame">
                    <div id="edit_vars_grid" class="edit_grid_frame"></div>
                </div>
                <div id="edit_vars_controls" class="controls_frame" style="position: absolute; bottom: 0;"></div>
            </dialog>
        </div>
        <br>
        <div style="display: flex; justify-content: center;">
            <div id="add_ons_menu" class="add_ons">
                <div id="addons_buttons" class="add_ons_frame">
                    <div id="addons_buttons_grid" class="add_ons_input_grid_frame"></div>
                </div><div id="addons_output" class="add_ons_frame">
                    <div id="addons_output_grid" class="add_ons_output_grid_frame"></div>
                </div>
            </div>
        </div>
        <!-- <script src="local_json/id_order.js"></script>
        <script src="local_json/input_options.js"></script>
        <script src="local_json/calculator_data.js"></script> -->
        <script>
            const GUI = new GUI_creator();
            const add_ons = new Calc_add_ons();
            const input_options_promise = GUI.call_API("./calculator_version_data/input_options.json", "Calculator Files")
            const id_order_promise = GUI.call_API("./calculator_version_data/id_order.json", "Calculator Files")
            const calculator_data_promise = GUI.call_API("./calculator_data.json", "Calculator Files")
            let calc;
            let MD;
            Promise.all([input_options_promise, id_order_promise, calculator_data_promise]).then((resolves) => {
                const [input_options_json, id_order_json, calculator_data_json] = resolves;
                MD = new H_data_M({"calculator_data": calculator_data_json});
                calc = new Calculator({"input_options": input_options_json, "id_order": id_order_json});
            })
            // const MD = new H_data_M({"calculator_data": calculator_data_json});
            // let calc = new Calculator({"input_options": input_options_json, "id_order": id_order_json});
        </script>
    </body>
</html>
